query getServiceById($id: String!) {
  service: getServiceById(id: $id) {
    _id
    name
    projectId
    type
    createdAt
    updatedAt
    activeDeployment {
      _id
      containerId
      serviceId
      status
      containerStatus
      config {
        image
        cpuLimit
        memoryLimit
        domains {
          domain
          status
          path
          port
        }
      }
      createdAt
      updatedAt
    }
    draftDeployment {
      _id
      containerId
      serviceId
      status
      containerStatus
      config {
        image
        cpuLimit
        memoryLimit
        domains {
          domain
          status
          path
          port
        }
      }
      createdAt
      updatedAt
    }
  }
}
