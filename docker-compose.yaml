version: '3.8'

services:
  traefik:
    image: traefik:v3.4
    container_name: traefik
    ports:
      - '80:80'
      - '443:443'
    command:
      - --providers.docker=true
      - --providers.docker.exposedByDefault=false
      - --providers.docker.network=traefik-public
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.tlschallenge=true
      - --certificatesresolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --log.level=INFO
      - --api.dashboard=false
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-certificates:/letsencrypt
    networks:
      - traefik-public
    restart: unless-stopped

  server:
    container_name: server
    user: root
    build:
      context: ./server
      dockerfile: Dockerfile
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - NODE_ENV=production
      - IP=${IP}
      - MONGODB_URI=mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@mongo:27017/${MONGO_DATABASE}?authSource=admin&directConnection=true
    networks:
      - app-network
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy

  dashboard:
    container_name: dashboard
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        - API_URL=http://server:8080
    environment:
      - NODE_ENV=production
      - API_URL=http://server:8080
    networks:
      - app-network
      - traefik-public
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.swarm=true
      - traefik.swarm.exposedByDefault=false
      - traefik.swarm.network=traefik-public
      - traefik.swarm.endpoint=tcp://127.0.0.1:2377
      - traefik.http.routers.dashboard.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.dashboard.entrypoints=web
      - traefik.http.routers.dashboard.middlewares=redirect-to-https
      - traefik.http.routers.dashboard-secure.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.dashboard-secure.entrypoints=websecure
      - traefik.http.routers.dashboard-secure.tls.certresolver=letsencrypt
      - traefik.http.services.dashboard.loadbalancer.server.port=3000
      - traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https
      - traefik.http.middlewares.redirect-to-https.redirectscheme.permanent=true
      - traefik.docker.network=traefik-public
    depends_on:
      - server

  mongo:
    image: mongo:7
    container_name: mongo
    volumes:
      - mongo_data:/data/db
    ports:
      - '27017:27017'
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
      - MONGO_INITDB_DATABASE=${MONGO_DATABASE}
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  mongo_data:
  traefik-certificates:

networks:
  traefik-public:
    driver: bridge
  app-network:
    driver: bridge
