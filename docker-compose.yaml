version: '3.8'

services:
  traefik:
    image: traefik:v3.0
    ports:
      - '80:80'
      - '443:443'
    command:
      - --providers.docker=true
      - --providers.docker.swarmMode=true
      - --providers.docker.exposedByDefault=false
      - --providers.docker.network=traefik-public
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.tlschallenge=true
      - --certificatesresolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-certificates:/letsencrypt
    networks:
      - traefik-public
    deploy:
      placement:
        constraints:
          - node.role == manager

  server:
    container_name: server
    user: root
    build:
      context: ./server
      dockerfile: Dockerfile
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - NODE_ENV=production
      - IP=${IP}
      - MONGODB_URI=mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@mongo:27017/${MONGO_DATABASE}?authSource=admin&directConnection=true
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy

  dashboard:
    container_name: dashboard
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        - API_URL=http://server:8080
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - API_URL=http://server:8080
    networks:
      - app-network
      - traefik-public
    restart: unless-stopped
    deploy:
      labels:
        - traefik.enable=true
        - traefik.http.routers.server.rule=Host(`${DOMAIN}`)
        - traefik.http.routers.server.entrypoints=web
        - traefik.http.routers.server.middlewares=redirect-to-https
        - traefik.http.routers.server-secure.rule=Host(`${DOMAIN}`)
        - traefik.http.routers.server-secure.entrypoints=websecure
        - traefik.http.routers.server-secure.tls.certresolver=letsencrypt
        - traefik.http.services.server.loadbalancer.server.port=3000
        - traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https
        - traefik.http.middlewares.redirect-to-https.redirectscheme.permanent=true
        - traefik.docker.network=traefik-public
    depends_on:
      - server

  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    ports:
      - '27017:27017'
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
      - MONGO_INITDB_DATABASE=${MONGO_DATABASE}
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  mongo_data:
  traefik-certificates:

networks:
  traefik-public:
    external: true
  app-network:
    driver: overlay
